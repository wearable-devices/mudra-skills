name: release
run-name: "release (${{ github.event_name }}) by @${{ github.actor }}"

# Two ways to release. Either bumps the version (the single source of truth), syncs
# every derived artifact, commits + tags, publishes to npm with provenance via OIDC
# (no token), and creates the GitHub Release with the skill ZIPs attached.
#
#   1. Manual  — Actions tab → "release" → Run workflow, pick patch/minor/major.
#   2. On merge — merge a PR into main carrying a label: release:patch,
#      release:minor, or release:major. No release:* label = no release.
#
# Both paths pause on the "release" environment for required-reviewer approval
# before anything is published.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # push the version-bump commit + tag, and create the GitHub Release
  id-token: write   # npm Trusted Publishing (OIDC) — short-lived token + provenance

jobs:
  release:
    # Run on a manual dispatch, OR when a PR is MERGED into main carrying a release:* label.
    # (A PR that is closed without merging, or merged without a label, does nothing.)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'release:patch') ||
        contains(github.event.pull_request.labels.*.name, 'release:minor') ||
        contains(github.event.pull_request.labels.*.name, 'release:major')))
    runs-on: ubuntu-latest
    environment: release   # required-reviewer approval gate; the job pauses here until approved
    steps:
      # Resolve the bump type and the branch to release from, for either trigger.
      # Runs before checkout — it only reads event context, no repo files needed.
      - name: Resolve release parameters
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ inputs.bump }}"
            REF="${{ github.ref_name }}"
          else
            REF="main"
            labels=",${{ join(github.event.pull_request.labels.*.name, ',') }},"
            case "$labels" in
              *",release:major,"*) BUMP="major" ;;
              *",release:minor,"*) BUMP="minor" ;;
              *",release:patch,"*) BUMP="patch" ;;
              *) echo "::error::No release:* label on the merged PR — nothing to release."; exit 1 ;;
            esac
          fi
          echo "Resolved bump=$BUMP ref=$REF"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "ref=$REF"   >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}   # main (on merge) or the dispatched branch
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) needs npm >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump package.json only. We commit + tag explicitly below, because `npm version`'s
      # own git step is unreliable when the package lives in a subdirectory (mudra-plugin/)
      # rather than the git root — it silently skips the commit/tag. The `version`
      # lifecycle hook still runs `npm run sync`.
      - name: Bump version
        working-directory: mudra-plugin
        run: npm version ${{ steps.meta.outputs.bump }} --no-git-tag-version

      - name: Read new version
        id: v
        run: echo "version=$(node -p "require('./mudra-plugin/package.json').version")" >> "$GITHUB_OUTPUT"

      # Regenerate every derived artifact at the new version (idempotent; also runs via
      # the hook above — explicit here so the result never depends on hook timing).
      - name: Sync derived artifacts
        run: node mudra-plugin/scripts/sync-skills.mjs

      - name: Commit and tag
        run: |
          git add -A
          git commit -m "release: v${{ steps.v.outputs.version }}"
          git tag -a "v${{ steps.v.outputs.version }}" -m "v${{ steps.v.outputs.version }}"

      # Push the commit, then the tag explicitly. (Not --follow-tags: it only pushes
      # annotated tags reachable from the ref, and a missing tag breaks the Release step.)
      - name: Push commit and tag
        run: |
          git push origin "HEAD:${{ steps.meta.outputs.ref }}"
          git push origin "v${{ steps.v.outputs.version }}"

      - name: Publish to npm with provenance
        working-directory: mudra-plugin
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.v.outputs.version }}" \
            --title "v${{ steps.v.outputs.version }}" \
            --generate-notes \
            "Skill download/mudra-master.zip" \
            "Skill download/mudra-preview.zip" \
            "Skill download/mudra-xr.zip"
